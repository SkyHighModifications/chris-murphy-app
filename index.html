<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://unpkg.com;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com;
img-src 'self' data:;
connect-src 'self';
">

<title>Chris Murphy</title>

<script src="./node_modules/html2pdf.js/dist/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="titlebar">

    <div class="title-left">
        <img src="./assets/cm.ico" class="logo">
        <span class="titleMain">Chris Murphy</span>
        <span class="subtitle app-version" id="version">Version …</span>
    </div>

    <div class="title-controls">

        <button id="minimize"><i data-lucide="minus"></i></button>
        <button id="maximize"><i data-lucide="square"></i></button>
        <button id="close"><i data-lucide="x"></i></button>

    </div>

</div>

<div class="toolbar">

    <button id="newBtn" title="New Document">
        <i data-lucide="file-plus-corner"></i>
    </button>

    <button id="newCustomerBtn" title="New Customer">
        <i data-lucide="user-round-plus"></i>
    </button>

    <button id="saveCustomerBtn" title="Save Customer">
        <i data-lucide="user-check" id="saveIcon"></i>
    </button>

    <button id="printBtn" title="Print PDF">
        <i data-lucide="printer"></i>
    </button>

    <button id="pdfBtn" title="Save PDF">
        <i data-lucide="save"></i>
    </button>

</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="brand">
            <img src="./assets/cm.ico" alt="Chris Murphy">
        </div>

        <div class="section">

            <label>Customers</label>

            <div class="dropdown">
                
                <input 
                    id="search"
                    class="dropdown-input"
                    placeholder="Search customer..."
                    autocomplete="off"
                >

                <div class="dropdown-list" id="customerList"></div>

            </div>

        </div>

        <div class="section">

            <label>Customer Name</label>
            <input id="customer">

            <label>Address</label>
            <textarea id="address"></textarea>

        </div>

        <div class="section" id="payment">

        <label for="account">Select Payment Account:</label>
        <select id="account">
            <option value="dad">Dad's Account</option>
            <option value="joint">Joint Account</option>
        </select>

        </div>

        <div class="section">

            <button id="addJobRowBtn" title="Add Job Row" style="display:none;">
                <i data-lucide="plus"></i> Job Row
            </button>

            <button id="loadJobSheetBtn" title="Load Job Sheet" style="display:none;">
                <i data-lucide="hard-drive-upload"></i> Load Job Sheet
            </button>

            <button id="saveJobSheetBtn" title="Save Job Sheet" style="display:none;">
                <i data-lucide="hard-drive-download"></i> Save Job Sheet
            </button>

            <button id="addTimeRowBtn" title="Add Time Row" style="display:none;">
                <i data-lucide="plus"></i> Time Row
            </button>

        </div>

        <div class="button-group">

            <!--<button id="emailBtn">
                Send Email
            </button>-->

        </div>

    </div>

    <!-- PREVIEW -->
    <div class="preview-wrapper">

        <div id="invoice"></div>

    </div>

</div>

<div class="footerbar">
   &copy; <span id="currentYear"></span> | Developed by Kieran Murphy. All rights reserved.
</div>

<div id="toast" class="toast"></div>

<div id="modalOverlay" class="modal-overlay modal-overlay--docs">

    <div class="modal modal--new-doc">

        <div class="modal--new-doc-glow" aria-hidden="true"></div>

        <h2 id="modalTitle">New Document</h2>

        <p id="modalMessage"></p>

        <div class="modal-buttons modal-buttons--docs">

            <button type="button" id="modalTimesheet" class="doc-modal-btn doc-modal-btn--timesheet">
                <span class="doc-modal-btn__shine" aria-hidden="true"></span>
                <i data-lucide="clipboard-clock"></i>
                <span>Time Sheet</span>
            </button>

            <button type="button" id="modalJobsheet" class="doc-modal-btn doc-modal-btn--jobsheet">
                <span class="doc-modal-btn__shine" aria-hidden="true"></span>
                <i data-lucide="chart-no-axes-gantt"></i>
                <span>Job Sheet</span>
            </button>

            <button type="button" id="modalInvoice" class="doc-modal-btn doc-modal-btn--invoice">
                <span class="doc-modal-btn__shine" aria-hidden="true"></span>
                <i data-lucide="file-text"></i>
                <span>Invoice</span>
            </button>

            <button type="button" id="modalQuote" class="doc-modal-btn doc-modal-btn--quote">
                <span class="doc-modal-btn__shine" aria-hidden="true"></span>
                <i data-lucide="file"></i>
                <span>Quote</span>
            </button>

            <button type="button" id="modalSaveCustomer" class="doc-modal-btn doc-modal-btn--save">
                <span class="doc-modal-btn__shine" aria-hidden="true"></span>
                <i data-lucide="save"></i>
                <span>Save Customer</span>
            </button>

            <button type="button" id="modalCancel" class="doc-modal-btn doc-modal-btn--cancel">
                <span class="doc-modal-btn__shine" aria-hidden="true"></span>
                <i data-lucide="x"></i>
                <span>Cancel</span>
            </button>

        </div>

    </div>

</div>

<div id="jobSheetModal" class="modal-overlay job-sheet-modal" aria-hidden="true">
    <div class="modal modal--job-sheet">
        <header class="job-sheet-modal-header">
            <h2>Load Job Sheet</h2>
            <p class="modal-subtitle">Click a sheet to open it. Your last opened sheet appears at the top.</p>
        </header>

        <div id="jobSheetRecent" class="job-sheet-recent" hidden></div>

        <div id="jobSheetList" class="job-sheet-list" role="list" aria-label="Saved job sheets"></div>

        <div class="modal-buttons modal-buttons--end">
            <button type="button" id="closeJobSheetModal" class="btn-secondary">Close</button>
        </div>
    </div>
</div>

<div id="whatsNewModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal--whats-new">
        <header class="whats-new-header">
            <h2 id="whatsNewTitle">What's New</h2>
            <span class="whats-new-version" id="whatsNewVersion"></span>
        </header>
        <div class="whats-new-body">
            <ul id="whatsNewList"></ul>
        </div>
        <footer class="whats-new-footer">
            <button type="button" id="whatsNewDismiss">Got it</button>
        </footer>
    </div>
</div>

<script src="renderer/version.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script type="module" src="renderer/script.js" defer></script>
</body>
</html>
