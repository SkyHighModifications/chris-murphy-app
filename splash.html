<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self';">
<title>Chris Murphy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #3b82f6;
    --primary-light: #60a5fa;
    --accent: #8b5cf6;
    --bg: #0b1120;
    --card: rgba(21, 31, 50, 0.92);
    --border: rgba(148, 163, 184, 0.14);
    --text: #f1f5f9;
    --muted: #8b9cb8;
    --muted-dim: #64748b;
}

*, *::before, *::after {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
}

/* Ambient glow behind card (visible on transparent window) */
.splash {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.splash-ambient {
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.35) 0%, rgba(139, 92, 246, 0.12) 45%, transparent 70%);
    filter: blur(2px);
    animation: ambientPulse 3.5s ease-in-out infinite;
    pointer-events: none;
}

@keyframes ambientPulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.12); }
}

.splash-card {
    position: relative;
    width: 100%;
    max-width: 340px;
    padding: 36px 32px 28px;
    text-align: center;
    background: var(--card);
    backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 24px 48px rgba(0, 0, 0, 0.45),
        0 0 60px rgba(59, 130, 246, 0.08);
    animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes cardEnter {
    from {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* Logo */
.logo-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin: 0 auto;
    padding: 2px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--primary), var(--accent), var(--primary-light), var(--primary));
    background-size: 300% 300%;
    animation: borderShift 3s ease infinite;
    box-shadow: 0 0 24px rgba(59, 130, 246, 0.35);
}

@keyframes borderShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.logo {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    object-fit: cover;
    background: var(--bg);
    padding: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}

.title {
    margin: 22px 0 0;
    font-family: "Delius", cursive;
    font-size: 1.65rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    background: linear-gradient(90deg, #fff 0%, #cbd5e1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.tagline {
    margin: 6px 0 0;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
}

/* Progress */
.progress {
    margin-top: 28px;
}

.progress-track {
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
}

.progress-bar {
    position: absolute;
    inset: 0;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), transparent);
    border-radius: 999px;
    animation: progressSlide 1.8s ease-in-out infinite;
}

.progress-glow {
    position: absolute;
    inset: -2px 0;
    background: linear-gradient(90deg, transparent 20%, rgba(59, 130, 246, 0.4) 50%, transparent 80%);
    filter: blur(4px);
    animation: progressSlide 1.8s ease-in-out infinite;
    opacity: 0.6;
}

@keyframes progressSlide {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(320%); }
}

/* Status — driven by main process via splashApi */
.status-wrap {
    margin-top: 20px;
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.status {
    margin: 0;
    font-size: 0.82rem;
    line-height: 1.4;
    color: var(--muted);
    text-align: center;
    transition: opacity 0.25s ease;
}

.status.is-updating {
    opacity: 0.55;
}

/* Footer */
.splash-footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 0.68rem;
    color: var(--muted-dim);
    letter-spacing: 0.04em;
}

.splash-footer .dot {
    opacity: 0.4;
}

#version {
    font-family: ui-monospace, Consolas, monospace;
    color: var(--muted);
}

@media (prefers-reduced-motion: reduce) {
    .progress-bar,
    .progress-glow,
    .splash-ambient,
    .logo-wrap {
        animation: none !important;
    }
    .splash-card {
        animation: none !important;
    }
}
</style>
</head>

<body>

<div class="splash">
    <div class="splash-ambient" aria-hidden="true"></div>

    <div class="splash-card">
        <div class="logo-wrap">
            <img src="./assets/cm.ico" class="logo" alt="Chris Murphy">
        </div>

        <h1 class="title">Chris Murphy</h1>
        <p class="tagline">Work Templates & Billing</p>

        <div class="progress" role="progressbar" aria-label="Loading application">
            <div class="progress-track">
                <div class="progress-glow" aria-hidden="true"></div>
                <div class="progress-bar"></div>
            </div>
        </div>

        <div class="status-wrap">
            <p class="status" id="status">Initialising…</p>
        </div>

        <footer class="splash-footer">
            <span id="version">Loading version…</span>
            <span class="dot" aria-hidden="true">·</span>
            <span>Developed by Kieran Murphy</span>
        </footer>
    </div>
</div>

<script>
const statusEl = document.getElementById("status");
const versionEl = document.getElementById("version");

function setStatus(message) {
    if (!statusEl || !message) return;
    statusEl.classList.add("is-updating");
    requestAnimationFrame(() => {
        statusEl.textContent = message;
        statusEl.classList.remove("is-updating");
    });
}

if (window.splashApi) {
    window.splashApi.onStatus(setStatus);
    window.splashApi.onVersion((v) => {
        if (versionEl) versionEl.textContent = v;
    });
}
</script>

</body>
</html>
